name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      released: ${{ steps.release.outputs.new-release-published }}
      version: ${{ steps.release.outputs.release-version }}
      tag: ${{ steps.release.outputs.git-tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Create release
        id: release
        uses: codfish/semantic-release-action@v5.0.0
        with:
          repository-url: https://github.com/${{ github.repository }}
          branches: |
            [
              "main"
            ]
          plugins: |
            [
              "@semantic-release/commit-analyzer",
              "@semantic-release/release-notes-generator",
              "@semantic-release/github"
            ]
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  discover:
    name: Discover services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: List services
        id: list
        run: |
          services=$(
            find cmd -mindepth 1 -maxdepth 1 -type d | xargs -I{} basename {} | sort | while read -r svc; do
              [ -f "cmd/${svc}/Containerfile" ] || [ -f "Containerfile" ] && echo "$svc"
            done | jq -R . | jq -sc .
          )
          echo "matrix={\"service\":$services}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish ${{ matrix.service }}
    needs:
      - release
      - discover
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Run code generators
        run: go generate ./...

      - name: Check if service changed
        id: changed
        env:
          MODULE: github.com/nicklasfrahm-dev/platform
          SERVICE: ${{ matrix.service }}
          NEW_TAG: ${{ needs.release.outputs.tag }}
        run: |
          prev_tag=$(git describe --tags --abbrev=0 "${NEW_TAG}^" 2>/dev/null || true)

          if [ -z "$prev_tag" ]; then
            echo "No previous tag — treating service as changed"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # If workflow files changed, treat all services as changed
          if git diff --name-only "${prev_tag}" HEAD -- .github/workflows/ | grep -q .; then
            echo "Workflow files changed — treating all services as changed"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Resolve internal pkg/ packages this service depends on
          pkg_paths=$(go list -deps "./cmd/${SERVICE}/..." 2>/dev/null \
            | grep "^${MODULE}/pkg/" \
            | sed "s|${MODULE}/||")

          # Build the set of paths to diff
          paths=("cmd/${SERVICE}")
          while IFS= read -r pkg; do
            [ -n "$pkg" ] && paths+=("$pkg")
          done <<< "$pkg_paths"

          if git diff --name-only "${prev_tag}" HEAD -- "${paths[@]}" | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=false" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.changed.outputs.changed == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.changed.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: steps.changed.outputs.changed == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        if: steps.changed.outputs.changed == 'true'
        id: tags
        env:
          SERVICE: ${{ matrix.service }}
          VERSION: ${{ needs.release.outputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          {
            echo "value<<EOF"
            echo "ghcr.io/${{ github.repository }}/${SERVICE}:${VERSION}"
            [ "${REF_NAME}" = "main" ] && echo "ghcr.io/${{ github.repository }}/${SERVICE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve Containerfile
        if: steps.changed.outputs.changed == 'true'
        id: containerfile
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          file="cmd/${SERVICE}/Containerfile"
          [ -f "$file" ] || file="Containerfile"
          echo "path=$file" >> "$GITHUB_OUTPUT"

      - name: Build and push container image
        if: steps.changed.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ steps.containerfile.outputs.path }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.value }}
          build-args: |
            SERVICE=${{ matrix.service }}
            VERSION=${{ needs.release.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
