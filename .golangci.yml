version: "2"

run:
  timeout: 10m

linters:
  default: all
  disable:
    # dependency allowlist — configure when policy is set
    - depguard
    # requires zero-value fields to be explicit — too verbose for stdlib types
    - exhaustruct
    # deprecated; replaced by wsl_v5
    - wsl

  settings:
    tagliatelle:
      case:
        rules:
          json: camel
        overrides:
          - pkg: cmd/vllm-bench/openai\.go
            rules:
              json: snake
    testpackage:
      allow-packages:
        - main
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
