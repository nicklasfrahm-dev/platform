version: "2"

run:
  timeout: 10m

linters:
  default: all
  disable:
    # dependency allowlist — configure when policy is set
    - depguard
    # requires zero-value fields to be explicit — too verbose for stdlib types
    - exhaustruct
    # deprecated linters
    - gomodguard
    - wsl

  settings:
    tagliatelle:
      case:
        rules:
          json: camel
    testpackage:
      allow-packages:
        - main
  exclusions:
    rules:
      - path: cmd/vllm-bench/openai\.go
        linters:
          - tagliatelle
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
