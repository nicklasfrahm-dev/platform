apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: {{ .Release.Name | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "gateway.labels" $ | nindent 4 }}
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        # Use a predictable name instead of the autogenerated default so
        # that the Service is easy to find and reference from outside the
        # chart (e.g. BGP advertisements, DNS).
        name: {{ .Release.Name | quote }}
        # Use "Cluster" so that the BGP control plane can advertise the
        # gateway address from any node, not just nodes that happen to run
        # the proxy pods. Client addresses are preserved end-to-end via the
        # PROXY protocol configured in the ClientTrafficPolicy, so the
        # "Local" default is not needed here and only adds a hard dependency
        # between proxy pod placement and BGP peering nodes.
        externalTrafficPolicy: {{ .Values.gateway.proxy.service.externalTrafficPolicy | quote }}
      envoyDeployment:
        name: {{ .Release.Name | quote }}
      envoyHpa:
        minReplicas: {{ .Values.gateway.proxy.autoscaling.minReplicas }}
        maxReplicas: {{ .Values.gateway.proxy.autoscaling.maxReplicas }}
      envoyPDB:
        maxUnavailable: {{ .Values.gateway.proxy.disruptionBudget.maxUnavailable | quote }}
  telemetry:
    accessLog:
      settings:
        - format:
            type: JSON
            json:
              {{- toYaml .Values.gateway.proxy.accessLog.format | nindent 14 }}
          sinks:
            - type: File
              file:
                path: /dev/stdout
