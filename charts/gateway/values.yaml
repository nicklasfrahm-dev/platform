gateway:
  name: "shared-http"
  className: "envoy-gateway"
  proxyProtocol:
    enabled: true
    # Set to true only if not all upstream traffic sends the PROXY protocol
    # header, e.g. during a migration. Breaks spec compliance.
    optional: false
  tls:
    enabled: true
    issuer:
      kind: "Issuer"
      name: "letsencrypt-production"
  hostnames:
    - "example.com"
  infrastructure:
    labels: {}
    # serving.kserve.io/gateway: shared-http

issuers:
  letsEncryptProduction:
    enabled: true
    kind: "Issuer"
    name: "letsencrypt-production"
    server: "https://acme-v02.api.letsencrypt.org/directory"
  letsEncryptStaging:
    enabled: false
    kind: "Issuer"
    name: "letsencrypt-staging"
    server: "https://acme-staging-v02.api.letsencrypt.org/directory"
