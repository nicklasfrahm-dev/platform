apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: {{ .Values.inferenceService.runtimeName }}
spec:
  supportedModelFormats:
    - name: huggingface
      version: "1"
      autoSelect: false
  containers:
    - name: kserve-container
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
      command:
        - /bin/sh
        - -c
      args:
        - |
          {{- if .Values.vllm.enableServerLoadTracking }}
          cat > /tmp/{{ .Values.vllm.middlewareName | replace "." "_" }} << 'PYEOF'
          from starlette.middleware.base import BaseHTTPMiddleware
          from starlette.responses import JSONResponse

          MAX_CONCURRENT = {{ .Values.vllm.maxNumSeqs }}

          class BackpressureMiddleware(BaseHTTPMiddleware):
              async def dispatch(self, request, call_next):
                  if (
                      "/v1/" in str(request.url)
                      and request.method not in ("GET", "OPTIONS", "HEAD")
                  ):
                      load = getattr(
                          request.app.state, "server_load_metrics", 0
                      )
                      if load >= MAX_CONCURRENT:
                          return JSONResponse(
                              {
                                  "error": {
                                      "message": "Server overloaded — try again later.",
                                      "type": "server_error",
                                      "code": 503,
                                  }
                              },
                              status_code=503,
                          )
                  return await call_next(request)
          PYEOF
          export PYTHONPATH=/tmp:${PYTHONPATH:-}
          {{- end }}
          exec python3 -m vllm.entrypoints.openai.api_server \
            --model="${MODEL_ID}" \
            --tensor-parallel-size=1 \
            --gpu-memory-utilization={{ .Values.vllm.gpuMemoryUtilization }} \
            --max-model-len={{ .Values.model.maxModelLen }} \
            --dtype={{ .Values.model.dtype }} \
            --trust-remote-code \
            --quantization={{ .Values.model.quantization }} \
            --max-num-seqs={{ .Values.vllm.maxNumSeqs }} \
            {{- if .Values.vllm.enableServerLoadTracking }}
            --enable-server-load-tracking \
            --middleware={{ .Values.vllm.middlewareName }} \
            {{- end }}
            {{- if .Values.vllm.toolCallParser }}
            --tool-call-parser={{ .Values.vllm.toolCallParser }} \
            {{- end }}
            {{- if .Values.vllm.reasoningParser }}
            --reasoning-parser={{ .Values.vllm.reasoningParser }} \
            {{- end }}
            {{- if .Values.vllm.chatTemplate }}
            --chat-template={{ .Values.vllm.chatTemplate }} \
            {{- end }}
      env:
        - name: MODEL_ID
          value: {{ .Values.model.id | quote }}
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.auth.secretName }}
              key: {{ .Values.auth.secretKey }}
      resources:
        {{- toYaml .Values.resources | nindent 8 }}
      ports:
        - containerPort: 8000
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: {{ .Values.inferenceService.name }}
spec:
  predictor:
    deploymentStrategy:
      type: {{ .Values.inferenceService.deploymentStrategy.type }}
    runtimeClassName: {{ .Values.resources.limits.nvidia.com/gpu | default "nvidia" }}
    {{- if .Values.nodeSelector }}
    nodeSelector:
      {{- toYaml .Values.nodeSelector | nindent 6 }}
    {{- end }}
    {{- if .Values.tolerations }}
    tolerations:
      {{- toYaml .Values.tolerations | nindent 6 }}
    {{- end }}
    model:
      modelFormat:
        name: huggingface
      runtime: {{ .Values.inferenceService.runtimeName }}
      env:
        - name: MODEL_ID
          value: {{ .Values.model.id | quote }}
      resources:
        {{- toYaml .Values.resources | nindent 8 }}
