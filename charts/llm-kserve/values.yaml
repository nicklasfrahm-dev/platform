# Global defaults
image:
  repository: vllm/vllm-openai
  tag: gemma4

# Model configuration
model:
  id: ""
  quantization: compressed-tensors
  dtype: auto
  maxModelLen: 131072
  trustRemoteCode: true

# vLLM specific parameters
vllm:
  maxNumSeqs: 4
  gpuMemoryUtilization: 0.95
  enableServerLoadTracking: true
  # Specialized for Gemma 4
  middlewareName: backpressure.BackpressureMiddleware
  toolCallParser: gemma4
  reasoningParser: gemma4
  chatTemplate: examples/tool_chat_template_gemma4.jinja

# Secret configuration
auth:
  secretName: hf-secret
  secretKey: HF_TOKEN

# Infrastructure
resources:
  limits:
    nvidia.com/gpu: 1
    memory: "12Gi"
  requests:
    nvidia.com/gpu: 1
    memory: "12Gi"

nodeSelector: {}

tolerations: []

# KServe InferenceService configuration
inferenceService:
  name: llm-service
  runtimeName: vllm-runtime
  deploymentStrategy:
    type: Recreate
