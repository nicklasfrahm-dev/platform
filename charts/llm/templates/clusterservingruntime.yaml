{{- $profile := index .Values.model.profile .Values.model.name }}
{{- $version := (($profile).vllm).version | default .Values.runtime.vllm.version }}
apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: {{ .Release.Name }}-runtime
spec:
  supportedModelFormats:
    - name: huggingface
      version: "1"
      autoSelect: false
  containers:
    - name: kserve-container
      image: vllm/vllm-openai:{{ $version }}
      args:
        - "--model=$(MODEL_ID)"
        - "--tensor-parallel-size=1"
        - "--gpu-memory-utilization=0.95"
        - "--dtype=auto"
        - "--trust-remote-code"
        - "--max-num-seqs={{ $profile.maxNumSeqs }}"
        - "--enable-server-load-tracking"
        - "--middleware=backpressure.BackpressureMiddleware"
        - "--enable-auto-tool-choice"
        {{- range $profile.args }}
        - {{ . | quote }}
        {{- end }}
      env:
        - name: MODEL_ID
          value: ""
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
        - name: PYTHONPATH
          value: "/opt/workspace/middlewares:${PYTHONPATH:-}"
      volumeMounts:
        - name: middleware-volume
          mountPath: /opt/workspace/middlewares
          readOnly: true
      resources:
        {{- toYaml .Values.resources | nindent 8 }}
      ports:
        - containerPort: 8000
  volumes:
    - name: middleware-volume
      configMap:
        name: {{ .Release.Name }}-middlewares
