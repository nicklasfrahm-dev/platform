{{- $model := index .Values.model.profile .Values.model.name }}
{{- $gpu := index .Values.gpu.profile .Values.gpu.name }}
{{- $version := (($model).vllm).version | default .Values.runtime.vllm.version }}
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: {{ .Release.Name }}-runtime
  namespace: {{ .Release.Namespace }}
spec:
  supportedModelFormats:
    - name: huggingface
      version: "1"
      autoSelect: false
  containers:
    - name: kserve-container
      image: vllm/vllm-openai:{{ $version }}
      args:
        - "$(MODEL_ID)"
        - "--tensor-parallel-size={{ $gpu.tensorParallelSize }}"
        - "--gpu-memory-utilization={{ $gpu.gpuMemoryUtilization }}"
        - "--dtype=auto"
        {{- if $gpu.kvCacheDtype }}
        - "--kv-cache-dtype={{ $gpu.kvCacheDtype }}"
        {{- end }}
        - "--trust-remote-code"
        - "--max-num-seqs={{ $model.maxNumSeqs | default $gpu.maxNumSeqs }}"
        - "--enable-server-load-tracking"
        - "--middleware=backpressure.BackpressureMiddleware"
        - "--enable-auto-tool-choice"
        # Give uvicorn our JSON logging config (with the health-check access-log
        # filter) so its startup and access logs are JSON, not uvicorn's default
        # text format. This is independent of the VLLM_LOGGING_CONFIG_PATH env.
        - "--log-config-file=/opt/workspace/extensions/logging_config.json"
        # Disable tqdm progress bars (weight loading and CUDA graph capture) so
        # they do not emit non-JSON lines to the console.
        - "--no-use-tqdm-on-load"
        {{- if .Values.tracing.enabled }}
        - "--otlp-traces-endpoint={{ .Values.tracing.otlpEndpoint }}"
        {{- end }}
      env:
        - name: MODEL_ID
          value: ""
        {{- if .Values.tracing.enabled }}
        - name: OTEL_SERVICE_NAME
          value: "{{ .Release.Name }}"
        # Jaeger's OTLP receiver has no TLS configured.
        - name: OTEL_EXPORTER_OTLP_TRACES_INSECURE
          value: "true"
        {{- end }}
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
        - name: PYTHONPATH
          value: "/opt/workspace/extensions:${PYTHONPATH:-}"
        # Disable vLLM's built-in logging setup so it does not prefix every line
        # with "(Process pidN)"; sitecustomize.py applies the JSON config instead.
        - name: VLLM_CONFIGURE_LOGGING
          value: "0"
        # Keep transformers warnings; sitecustomize.py routes them through the
        # JSON root logger instead of transformers' raw "[transformers]" handler.
        - name: TRANSFORMERS_VERBOSITY
          value: "warning"
        # Disable Hugging Face Hub download progress bars (non-JSON output).
        - name: HF_HUB_DISABLE_PROGRESS_BARS
          value: "1"
      volumeMounts:
        - name: extensions-volume
          mountPath: /opt/workspace/extensions
          readOnly: true
      resources:
        {{- toYaml $gpu.resources | nindent 8 }}
      ports:
        - containerPort: 8000
  volumes:
    - name: extensions-volume
      configMap:
        name: {{ .Release.Name }}-extensions
