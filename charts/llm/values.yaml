runtime:
  vllm:
    version: "v0.22.0"

gpu:
  name: rtx3090
  profile:
    rtx3090:
      maxNumSeqs: 1
      gpuMemoryUtilization: 0.98
      tensorParallelSize: 1
      resources:
        limits:
          nvidia.com/gpu: 1
          memory: "12Gi"
        requests:
          nvidia.com/gpu: 1
          memory: "12Gi"

model:
  name: gemma4-26b
  profile:
    # Stable: RTX 3090 (24GB)
    gemma4-26b:
      modelId: "cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit"
      servedModelName: "gemma4-26b"
      args:
        - "--max-model-len=131072"
        - "--tool-call-parser=gemma4"
        - "--reasoning-parser=gemma4"
        - "--max-num-batched-tokens=4096"
        - "--chat-template=examples/tool_chat_template_gemma4.jinja"
        - "--default-chat-template-kwargs={\"enable_thinking\": true}"
        - "--quantization=compressed-tensors"
        - "--limit-mm-per-prompt={\"image\": 0, \"video\": 0}"
    # Stable: RTX 3090 (24GB)
    devstral-small:
      modelId: "cyankiwi/Devstral-Small-2507-AWQ-4bit"
      servedModelName: "devstral-small"
      args:
        - "--max-model-len=50176"
        - "--quantization=awq_marlin"
        - "--tokenizer-mode=mistral"
        - "--tool-call-parser=mistral"
    # Stable: RTX 3090 (24GB)
    qwen3-coder-30b:
      modelId: "cyankiwi/Qwen3-Coder-30B-A3B-Instruct-AWQ-4bit"
      servedModelName: "qwen3-coder-30b"
      args:
        - "--max-model-len=51200"
        - "--quantization=compressed-tensors"
        - "--tool-call-parser=qwen3_coder"
    # Untested: RTX 3090 (24GB), 17.2 GiB weights may leave little room for KV cache.
    glm47-flash:
      modelId: "cyankiwi/GLM-4.7-Flash-AWQ-4bit"
      servedModelName: "glm-4.7-flash"
      args:
        - "--max-model-len=64480"
        - "--quantization=compressed-tensors"
        - "--tool-call-parser=glm47"
        - "--reasoning-parser=glm45"
      vllm:
        version: "gemma4"
    # Untested: RTX 3090 (24GB)
    qwen25-coder-32b:
      modelId: "Qwen/Qwen2.5-Coder-32B-Instruct-AWQ"
      servedModelName: "qwen25-coder-32b"
      args:
        - "--max-model-len=40960"
        - "--quantization=awq_marlin"
        - "--tool-call-parser=hermes"
        - "--rope-scaling=linear"
        - "--rope-factor=2.0"
    # Untested: RTX 3090 (24GB)
    qwen35-27b:
      modelId: "cyankiwi/Qwen3.5-27B-AWQ-4bit"
      servedModelName: "qwen35-27b"
      args:
        - "--max-model-len=65536"
        - "--quantization=awq_marlin"
        - "--reasoning-parser=qwen3"
        - "--tool-call-parser=qwen3_coder"
    # Untested: RTX 3090 (24GB)
    qwen35-35b:
      modelId: "Intel/Qwen3.5-35B-A3B-int4-AutoRound"
      servedModelName: "qwen35-35b"
      args:
        - "--max-model-len=32768"
        - "--quantization=compressed-tensors"
        - "--language-model-only"
        - "--reasoning-parser=qwen3"
        - "--tool-call-parser=qwen3_coder"
    # Untested: RTX 3090 (24GB)
    qwen36-35b:
      modelId: "cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit"
      servedModelName: "qwen36-35b"
      args:
        - "--max-model-len=65536"
        - "--quantization=compressed-tensors"
        - "--language-model-only"
        - "--reasoning-parser=qwen3"
        - "--tool-call-parser=qwen3_coder"
    # Active: RTX 3090 (24GB), deployed on cph02
    qwen36-27b:
      modelId: "Intel/Qwen3.6-27B-int4-AutoRound"
      servedModelName: "qwen36-27b"
      args:
        - "--max-model-len=65536"
        - "--quantization=compressed-tensors"
        - "--reasoning-parser=qwen3"
        - "--tool-call-parser=qwen3_coder"
        - "--enable-chunked-prefill"
        - "--max-num-batched-tokens=8192"
        - "--max-cudagraph-capture-size=256"
    # Untested: RTX 3090 (24GB)
    qwen3-30b:
      modelId: "QuixiAI/Qwen3-30B-A3B-AWQ"
      servedModelName: "qwen3-30b"
      args:
        - "--max-model-len=40960"
        - "--quantization=awq_marlin"
        - "--tool-call-parser=hermes"
        - "--reasoning-parser=deepseek_r1"

route:
  hostname: "llm.cph02.nicklasfrahm.dev"
  gateway:
    name: public-web-gateway
    namespace: platform

auth:
  enabled: true
  providers:
    dex:
      enabled: true
      issuer: "https://auth.nicklasfrahm.dev"
    cph02:
      enabled: true
      jwksUri: "https://oidc.cph02.nicklasfrahm.dev/openid/v1/jwks"
  credentials:
    # Each enabled entry creates a ServiceAccount and a long-lived
    # ServiceAccountToken Secret, both named "<release-name>-<key>".
    # The resulting token is a Kubernetes service account JWT that can be
    # used as a Bearer token via the cph02 OIDC issuer (see auth.providers.cph02).
    # Ignored when auth.enabled is false.
    example: false
