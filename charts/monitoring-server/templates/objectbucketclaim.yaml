{{- if .Values.logsBucket.enabled }}
# Ceph object bucket backing Loki's long-term log storage. Generates a
# ConfigMap (BUCKET_HOST/PORT/NAME/REGION) and a Secret
# (AWS_ACCESS_KEY_ID/SECRET) named after this claim, consumed via
# loki.singleBinary.extraEnvFrom.
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: {{ .Values.logsBucket.name }}
  namespace: {{ .Release.Namespace }}
spec:
  generateBucketName: {{ .Values.logsBucket.name }}
  storageClassName: {{ .Values.logsBucket.storageClassName }}
{{- end }}
