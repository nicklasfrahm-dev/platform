{{- $proxy := index .Values "oauth2-proxy" }}
{{- if and $proxy.enabled $proxy.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ printf "%s" .Release.Name | quote }}
  namespace: {{ .Release.Namespace | quote }}
spec:
  parentRefs:
    - namespace: {{ $proxy.httpRoute.gateway.namespace | quote }}
      name: {{ $proxy.httpRoute.gateway.name | quote }}
  hostnames:
    - {{ $proxy.httpRoute.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ printf "%s-oauth2-proxy" .Release.Name | quote }}
          namespace: {{ .Release.Namespace | quote }}
          port: 80
{{- end }}
