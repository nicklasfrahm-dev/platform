{{- $proxy := index .Values "oauth2-proxy" }}
{{- if and $proxy.enabled $proxy.ssoSetup.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-sso-setup" .Release.Name | quote }}
  namespace: {{ .Release.Namespace | quote }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: sso-setup
          image: {{ $proxy.ssoSetup.image | quote }}
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              CEPH_CONFIG="/etc/ceph/ceph.conf"
              MON_CONFIG="/etc/rook/mon-endpoints"
              KEYRING_FILE="/etc/ceph/keyring"

              mon_endpoints=$(sed 's/[a-z0-9_-]\+=//g' "${MON_CONFIG}")

              cat > "${CEPH_CONFIG}" <<EOF
              [global]
              mon_host = ${mon_endpoints}

              [client.admin]
              keyring = ${KEYRING_FILE}
              EOF

              cat > "${KEYRING_FILE}" <<EOF
              [${ROOK_CEPH_USERNAME}]
              key = $(cat /var/lib/rook-ceph-mon/secret.keyring)
              EOF

              echo "Enabling OAuth2 SSO on Ceph Dashboard..."
              ceph dashboard sso enable oauth2

              {{- if $proxy.ssoSetup.telemetryOptIn }}
              echo "Opting in to Ceph telemetry..."
              ceph telemetry on --license sharing-1-0
              {{- else }}
              echo "Opting out of Ceph telemetry..."
              ceph telemetry off
              {{- end }}

              DESIRED_USERS=(
              {{- range $proxy.ssoSetup.adminUsers }}
                {{ . }}
              {{- end }}
              )

              {{- range $proxy.ssoSetup.adminUsers }}
              echo "Ensuring admin user {{ . }} exists..."
              if ceph dashboard ac-user-show {{ . | quote }} > /dev/null 2>&1; then
                echo "User {{ . }} already exists, updating roles..."
                ceph dashboard ac-user-set-roles {{ . | quote }} administrator > /dev/null
              else
                echo "Creating user {{ . }}..."
                openssl rand -base64 32 | \
                  ceph dashboard ac-user-create {{ . | quote }} -i /dev/stdin administrator > /dev/null
              fi
              {{- end }}

              echo "Removing stale admin users..."
              current_users=$(ceph dashboard ac-user-show --format json | \
                python3 -c "import sys,json; print('\n'.join(json.load(sys.stdin)))")
              while IFS= read -r user; do
                [[ -z "$user" ]] && continue
                found=false
                for desired in "${DESIRED_USERS[@]}"; do
                  [[ "$user" == "$desired" ]] && found=true && break
                done
                if [[ "$found" == "false" ]]; then
                  echo "Removing stale user: $user"
                  ceph dashboard ac-user-delete "$user"
                fi
              done <<< "$current_users"

              echo "SSO setup complete."
          env:
            - name: ROOK_CEPH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $proxy.ssoSetup.monSecret | quote }}
                  key: ceph-username
          resources:
            limits:
              memory: "128Mi"
            requests:
              cpu: "50m"
              memory: "128Mi"
          volumeMounts:
            - name: ceph-config
              mountPath: /etc/ceph
            - name: ceph-admin-secret
              mountPath: /var/lib/rook-ceph-mon
            - name: mon-endpoint-volume
              mountPath: /etc/rook
      volumes:
        - name: ceph-admin-secret
          secret:
            secretName: {{ $proxy.ssoSetup.monSecret | quote }}
            items:
              - key: ceph-secret
                path: secret.keyring
        - name: mon-endpoint-volume
          configMap:
            name: {{ $proxy.ssoSetup.monEndpointsConfigMap | quote }}
            items:
              - key: data
                path: mon-endpoints
        - name: ceph-config
          emptyDir: {}
{{- end }}
