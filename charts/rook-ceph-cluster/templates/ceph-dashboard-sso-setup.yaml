{{- $proxy := index .Values "oauth2-proxy" }}
{{- if and $proxy.enabled $proxy.ssoSetup.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-ceph-dashboard-sso-setup" .Release.Name | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | quote }}
    app.kubernetes.io/name: "ceph-dashboard"
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: sso-setup
          image: {{ $proxy.ssoSetup.image | quote }}
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              CEPH_CONFIG="/etc/ceph/ceph.conf"
              MON_CONFIG="/etc/rook/mon-endpoints"
              KEYRING_FILE="/etc/ceph/keyring"

              mon_endpoints=$(sed 's/[a-z0-9_-]\+=//g' "${MON_CONFIG}")

              cat > "${CEPH_CONFIG}" <<EOF
              [global]
              mon_host = ${mon_endpoints}

              [client.admin]
              keyring = ${KEYRING_FILE}
              EOF

              cat > "${KEYRING_FILE}" <<EOF
              [${ROOK_CEPH_USERNAME}]
              key = $(cat /var/lib/rook-ceph-mon/secret.keyring)
              EOF

              {{- $parts := list -}}
              {{- range $proxy.ssoSetup.groupRoles -}}
                {{- $part := printf "contains(groups[*], '%s') && `%s`" .group (.roles | toJson) -}}
                {{- $parts = append $parts $part -}}
              {{- end -}}
              {{- if $parts }}
              ROLES_PATH=$(cat <<'ROLES_PATH_EOF'
              {{ join " || " $parts }} || `[]`
              ROLES_PATH_EOF
              )
              echo "Enabling OAuth2 SSO on Ceph Dashboard with roles_path..."
              ceph dashboard sso enable oauth2 "$ROLES_PATH"
              {{- else }}
              echo "Enabling OAuth2 SSO on Ceph Dashboard..."
              ceph dashboard sso enable oauth2
              {{- end }}

              {{- if $proxy.ssoSetup.telemetryOptIn }}
              echo "Opting in to Ceph telemetry..."
              ceph telemetry on --license sharing-1-0
              {{- else }}
              echo "Opting out of Ceph telemetry..."
              ceph telemetry off
              {{- end }}

              echo "SSO setup complete."
          env:
            - name: ROOK_CEPH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $proxy.ssoSetup.monSecret | quote }}
                  key: ceph-username
          resources:
            limits:
              memory: "128Mi"
            requests:
              cpu: "50m"
              memory: "128Mi"
          volumeMounts:
            - name: ceph-config
              mountPath: /etc/ceph
            - name: ceph-admin-secret
              mountPath: /var/lib/rook-ceph-mon
            - name: mon-endpoint-volume
              mountPath: /etc/rook
      volumes:
        - name: ceph-admin-secret
          secret:
            secretName: {{ $proxy.ssoSetup.monSecret | quote }}
            items:
              - key: ceph-secret
                path: secret.keyring
        - name: mon-endpoint-volume
          configMap:
            name: {{ $proxy.ssoSetup.monEndpointsConfigMap | quote }}
            items:
              - key: data
                path: mon-endpoints
        - name: ceph-config
          emptyDir: {}
{{- end }}
