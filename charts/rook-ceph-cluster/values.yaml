rook-ceph-cluster:
  enabled: true
  cephImage:
    tag: v20.2.1
  toolbox:
    enabled: true
    resources:
      limits:
        memory: "128Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"

  cephClusterSpec:
    mgr:
      modules:
        - name: rook
          enabled: true
        - name: pg_autoscaler
          enabled: true

    # enable the ceph dashboard for viewing cluster status
    dashboard:
      enabled: true
      ssl: false

    # Network configuration, see: https://github.com/rook/rook/blob/master/Documentation/CRDs/Cluster/ceph-cluster-crd.md#network-configuration-settings
    network:
      connections:
        encryption:
          enabled: true
        compression:
          enabled: true
        requireMsgr2: true

    # enable log collector, daemons will log on files and rotate
    logCollector:
      enabled: false

    # The option to automatically remove OSDs that are out and are safe to destroy.
    removeOSDsIfOutAndSafeToRemove: true

    storage:
      config:
        encryptedDevice: true

oauth2-proxy:
  enabled: false
  ingress:
    enabled: false
  config:
    existingSecret: ceph-dashboard-proxy
    requiredSecretKeys:
      - cookie-secret
    emailDomains:
      - "*"
  alphaConfig:
    enabled: true
    configData:
      upstreamConfig:
        upstreams:
          - id: dashboard
            uri: http://rook-ceph-mgr-dashboard:7000
            path: /
      injectRequestHeaders:
        - name: X-Access-Token
          values:
            - claim: access_token
  extraArgs:
    - --provider=oidc
    - --code-challenge-method=S256
    - --oidc-issuer-url=https://auth.nicklasfrahm.dev
    - --client-id=ceph-dashboard
    # oauth2-proxy requires a client secret even for public PKCE clients, /dev/null is the workaround:
    # https://github.com/oauth2-proxy/oauth2-proxy/issues/1714
    - --client-secret-file=/dev/null
    - --oidc-groups-claim=groups
    - --skip-provider-button=true
  httpRoute:
    enabled: true
    gateway:
      namespace: platform
      name: shared-http
    hostname: ""
  ssoSetup:
    enabled: true
    # Image must match the running Ceph cluster version.
    image: quay.io/ceph/ceph:v20.2.1
    # GitHub usernames to pre-create as Ceph Dashboard administrators.
    adminUsers: []
    # Names of the Rook-generated secret and configmap used to reach the MONs.
    monSecret: rook-ceph-mon
    monEndpointsConfigMap: rook-ceph-mon-endpoints
