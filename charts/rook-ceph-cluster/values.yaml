rook-ceph-cluster:
  enabled: true
  cephImage:
    tag: v20.2.1
  toolbox:
    enabled: true
    resources:
      limits:
        memory: "128Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"

  cephClusterSpec:
    mgr:
      modules:
        - name: rook
          enabled: true
        - name: pg_autoscaler
          enabled: true

    # enable the ceph dashboard for viewing cluster status
    dashboard:
      enabled: true
      ssl: false

    # Network configuration, see: https://github.com/rook/rook/blob/master/Documentation/CRDs/Cluster/ceph-cluster-crd.md#network-configuration-settings
    network:
      connections:
        encryption:
          enabled: true
        compression:
          enabled: true
        requireMsgr2: true

    # enable log collector, daemons will log on files and rotate
    logCollector:
      enabled: false

    # The option to automatically remove OSDs that are out and are safe to destroy.
    removeOSDsIfOutAndSafeToRemove: true

    storage:
      config:
        encryptedDevice: true

oauth2-proxy:
  enabled: false
  ingress:
    enabled: false
  config:
    existingSecret: ceph-dashboard-proxy
    requiredSecretKeys:
      - cookie-secret
    emailDomains:
      - "*"
  alphaConfig:
    enabled: true
    configData:
      providers:
        - id: oidc
          provider: oidc
          clientID: ceph-dashboard
          # oauth2-proxy requires a client secret even for public PKCE clients, /dev/null is the workaround:
          # https://github.com/oauth2-proxy/oauth2-proxy/issues/1714
          clientSecretFile: /dev/null
          oidcConfig:
            # URL of the OIDC issuer (e.g. https://dex.example.com).
            issuerURL: ""
            groupsClaim: groups
          code_challenge_method: S256
          # Restrict login to users in specific groups. Users outside these
          # groups are denied at the proxy before reaching Ceph Dashboard.
          # allowedGroups:
          #   - org:team
      upstreamConfig:
        upstreams:
          - id: dashboard
            uri: http://localhost:8080
            path: /
      injectRequestHeaders:
        - name: X-Access-Token
          values:
            - claimSource:
                claim: access_token
  extraArgs:
    - --skip-provider-button=true
    - --reverse-proxy=true
  extraContainers:
    - name: jti-injector
      image: openresty/openresty:1.27.1.2-alpine
      ports:
        - containerPort: 8080
      resources:
        limits:
          memory: "64Mi"
        requests:
          cpu: "50m"
          memory: "64Mi"
      volumeMounts:
        - name: jti-injector-config
          mountPath: /usr/local/openresty/nginx/conf/nginx.conf
          subPath: nginx.conf
  extraVolumes:
    - name: jti-injector-config
      configMap:
        # Must match {{ .Release.Name }}-jti-injector from the chart template.
        name: rook-ceph-cluster-jti-injector
  resources:
    limits:
      memory: "128Mi"
    requests:
      cpu: "50m"
      memory: "128Mi"
  # Public hostname for the Ceph Dashboard (required when enabled).
  httpRoute:
    enabled: true
    gateway:
      namespace: platform
      name: shared-http
    hostname: ""
  # Upstream Ceph Dashboard service that the jti-injector sidecar proxies to.
  dashboardUpstream: http://rook-ceph-mgr-dashboard:7000
  ssoSetup:
    enabled: true
    # Image must match the running Ceph cluster version.
    image: quay.io/ceph/ceph:v20.2.1
    # Names of the Rook-generated secret and configmap used to reach the MONs.
    monSecret: rook-ceph-mon
    monEndpointsConfigMap: rook-ceph-mon-endpoints
    # Set to true to opt in to Ceph telemetry (requires accepting the sharing license).
    telemetryOptIn: false
    # Maps OIDC groups to Ceph Dashboard roles. Groups are evaluated in order.
    # Available roles: administrator, read-only, block-manager, rgw-manager,
    #                  cluster-manager, pool-manager, cephfs-manager
    # Example:
    # groupRoles:
    #   - group: org:admins
    #     roles:
    #       - administrator
    #   - group: org:storage-team
    #     roles:
    #       - read-only
    #       - pool-manager
    groupRoles: []
