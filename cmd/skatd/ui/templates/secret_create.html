{{template "layout" .}}
{{define "content"}}
<h1>New Secret</h1>
{{if .Error}}
<div class="alert alert-error">{{.Error}}</div>
{{end}}
<div class="card">
  <form method="POST" action="/ui/secrets">
    <div class="form-group">
      <label for="namespace">Namespace</label>
      <input id="namespace" name="namespace" value="{{.Namespace}}" required>
    </div>
    <div class="form-group">
      <label for="name">Name</label>
      <input id="name" name="name" placeholder="my-secret" required>
    </div>
    <div class="form-group">
      <label for="data">Data <span style="font-weight:400;color:#888">(one KEY=VALUE per line)</span></label>
      <textarea id="data" name="data" placeholder="DB_PASSWORD=secret&#10;API_KEY=abc123"></textarea>
    </div>
    <div style="display:flex;gap:0.5rem;margin-top:0.5rem">
      <button type="submit" class="btn btn-primary">Create Secret</button>
      <a href="/ui/secrets?ns={{.Namespace}}" class="btn" style="background:#e9ecef;color:#333">Cancel</a>
    </div>
  </form>
</div>
{{end}}
