apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-middlewares
  namespace: platform
data:
  backpressure.py: |
    from starlette.middleware.base import BaseHTTPMiddleware
    from starlette.responses import JSONResponse

    MAX_CONCURRENT = 4  # mirrors --max-num-seqs

    class BackpressureMiddleware(BaseHTTPMiddleware):
        async def dispatch(self, request, call_next):
            if (
                "/v1/" in str(request.url)
                and request.method not in ("GET", "OPTIONS", "HEAD")
            ):
                load = getattr(
                    request.app.state, "server_load_metrics", 0
                )
                if load >= MAX_CONCURRENT:
                    return JSONResponse(
                        {
                            "error": {
                                "message": "Server overloaded — try again later.",
                                "type": "server_error",
                                "code": 503,
                            }
                        },
                        status_code=503,
                    )
            return await call_next(request)

  token_pricing.py: |
    import json
    import os
    from starlette.middleware.base import BaseHTTPMiddleware
    from starlette.responses import Response

    class TokenPricingMiddleware(BaseHTTPMiddleware):
        def __init__(self, app):
            super().__init__(app)
            self.prompt_price = float(os.getenv("PROMPT_TOKEN_PRICE", "0.0"))
            self.completion_price = float(os.getenv("COMPLETION_TOKEN_PRICE", "0.0"))
            self.prompt_cached_price = float(os.getenv("PROMPT_CACHED_TOKEN_PRICE", "0.0"))
            self.completion_cached_price = float(os.getenv("COMPLETION_CACHED_TOKEN_PRICE", "0.0"))

        async def dispatch(self, request, call_next):
            response = await call_next(request)
            
            if response.status_code == 200 and "/v1/chat/completions" in str(request.url):
                try:
                    body = await response.body()
                    data = json.loads(body)
                    
                    if "usage" in data:
                        usage = data["usage"]
                        prompt_total = usage.get("prompt_tokens", 0)
                        completion_total = usage.get("completion_tokens", 0)
                        
                        prompt_details = usage.get("prompt_tokens_details", {})
                        prompt_cached = prompt_details.get("cached_tokens", 0) if isinstance(prompt_details, dict) else 0
                        
                        completion_details = usage.get("completion_tokens_details", {})
                        completion_cached = completion_details.get("cached_tokens", 0) if isinstance(completion_details, dict) else 0
                        
                        # Cost calculation assumes prices are per 1M tokens
                        cost = ((prompt_total - prompt_cached) * self.prompt_price + \
                                (prompt_cached * self.prompt_cached_price) + \
                                (completion_total - completion_cached) * self.completion_price + \
                                (completion_cached * self.completion_cached_price)) / 1000000.0
                        
                        print(f"TOKEN_USAGE_LOG: model={data.get('model')} prompt={prompt_total} completion={completion_total} cost=${cost:.6f}")
                        
                        return Response(body, status_code=response.status_code, headers=dict(response.headers))
                except Exception as e:
                    print(f"TOKEN_PRICING_ERROR: {e}")
            
            return response


