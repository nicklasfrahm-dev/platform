# -----------------------------
# HTTPRoute (Gateway API) — points to Gemma 4
# -----------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kserve-route
spec:
  hostnames:
    - llm.cph02.nicklasfrahm.dev
  parentRefs:
    - name: shared-http
      namespace: platform
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: gemma4-moe-predictor
          port: 80
