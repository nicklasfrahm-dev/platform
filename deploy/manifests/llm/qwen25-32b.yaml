# -----------------------------
# ClusterServingRuntime (vLLM / Qwen 2.5 32B)
# -----------------------------
apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: vllm-qwen25-32b-runtime
spec:
  supportedModelFormats:
    - name: huggingface
      version: "1"
      autoSelect: false
  containers:
    - name: kserve-container
      image: vllm/vllm-openai:v0.19.0
      command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --model=$(MODEL_ID)
        - --tensor-parallel-size=1
        - --gpu-memory-utilization=0.95
        - --max-model-len=4096
        - --dtype=auto
        - --trust-remote-code
        - --quantization=awq
        - --max-num-seqs=2 # limit batching / queue depth
      env:
        - name: MODEL_ID
          value: ""
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
      resources:
        limits:
          nvidia.com/gpu: 1
          memory: "12Gi"
        requests:
          nvidia.com/gpu: 1
          memory: "12Gi"
      ports:
        - containerPort: 8000

---
# -----------------------------
# InferenceService (Qwen 2.5 32B Instruct AWQ)
# -----------------------------
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen25-32b
spec:
  predictor:
    deploymentStrategy:
      type: Recreate
    runtimeClassName: nvidia
    nodeSelector:
      feature.node.kubernetes.io/pci-10de.present: "true"
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
    model:
      modelFormat:
        name: huggingface
      runtime: vllm-qwen25-32b-runtime
      env:
        - name: MODEL_ID
          value: "Qwen/Qwen2.5-32B-Instruct-AWQ"
      resources:
        limits:
          nvidia.com/gpu: 1
          memory: "12Gi"
        requests:
          nvidia.com/gpu: 1
          memory: "12Gi"

---
# -----------------------------
# HTTPRoute (Gateway API)
# -----------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kserve-route
spec:
  hostnames:
    - llm.cph02.nicklasfrahm.dev
  parentRefs:
    - name: shared-http
      namespace: platform
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: qwen25-32b-predictor
          port: 80
