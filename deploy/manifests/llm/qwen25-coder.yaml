# -----------------------------
# ClusterServingRuntime (vLLM)
# -----------------------------
apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: vllm-coder-runtime
spec:
  supportedModelFormats:
    - name: huggingface
      version: "1"
      autoSelect: true
  containers:
    - name: kserve-container
      image: vllm/vllm-openai:gemma4
      # Write a tiny backpressure middleware to /tmp, then start vLLM with it.
      # Returns HTTP 503 immediately when server_load_metrics >= MAX_CONCURRENT
      # instead of queuing indefinitely; paired with --enable-server-load-tracking.
      command:
        - /bin/sh
        - -c
      args:
        - |
          cat > /tmp/backpressure.py << 'PYEOF'
          from starlette.middleware.base import BaseHTTPMiddleware
          from starlette.responses import JSONResponse

          MAX_CONCURRENT = 4  # mirrors --max-num-seqs

          class BackpressureMiddleware(BaseHTTPMiddleware):
              async def dispatch(self, request, call_next):
                  if (
                      "/v1/" in str(request.url)
                      and request.method not in ("GET", "OPTIONS", "HEAD")
                  ):
                      load = getattr(
                          request.app.state, "server_load_metrics", 0
                      )
                      if load >= MAX_CONCURRENT:
                          return JSONResponse(
                              {
                                  "error": {
                                      "message": "Server overloaded — try again later.",
                                      "type": "server_error",
                                      "code": 503,
                                  }
                              },
                              status_code=503,
                          )
                  return await call_next(request)
          PYEOF
          export PYTHONPATH=/tmp:${PYTHONPATH:-}
          exec python3 -m vllm.entrypoints.openai.api_server \
            --model="${MODEL_ID}" \
            --tensor-parallel-size=1 \
            --gpu-memory-utilization=0.9 \
            --max-model-len=32768 \
            --dtype=auto \
            --trust-remote-code \
            --quantization=awq_marlin \
            --enable-auto-tool-choice \
            --tool-call-parser=llama3_json \
            --max-num-seqs=4 \
            --enable-server-load-tracking \
            --middleware=backpressure.BackpressureMiddleware
      env:
        - name: MODEL_ID
          value: ""
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
      resources:
        limits:
          nvidia.com/gpu: 1
          memory: "11Gi"
        requests:
          nvidia.com/gpu: 1
          memory: "11Gi"
      ports:
        - containerPort: 8000

---
# -----------------------------
# InferenceService (Coder)
# -----------------------------
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: coder-qwen25
spec:
  predictor:
    deploymentStrategy:
      type: Recreate
    runtimeClassName: nvidia
    nodeSelector:
      feature.node.kubernetes.io/pci-10de.present: "true"
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
    model:
      modelFormat:
        name: huggingface
      runtime: vllm-coder-runtime
      env:
        - name: MODEL_ID
          value: "Qwen/Qwen2.5-Coder-7B-Instruct-AWQ"
      resources:
        limits:
          nvidia.com/gpu: 1
          memory: "11Gi"
        requests:
          nvidia.com/gpu: 1
          memory: "11Gi"

---
# -----------------------------
# HTTPRoute (Gateway API)
# -----------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kserve-route
spec:
  hostnames:
    - llm.cph02.nicklasfrahm.dev
  parentRefs:
    - name: shared-http
      namespace: platform
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: coder-qwen25-predictor
          port: 80
