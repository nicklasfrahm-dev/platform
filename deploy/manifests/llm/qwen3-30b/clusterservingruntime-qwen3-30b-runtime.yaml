# -----------------------------
# ClusterServingRuntime (vLLM / Qwen3 30B-A3B AWQ)
# MoE model: 30.5B total params, 3.3B active per token.
# YaRN rope scaling extends native 32K context to 131K.
# fp8 KV cache halves per-token KV memory (~48 KB/token),
# giving ~156K token KV pool on a 24 GB GPU.
# Thinking mode via deepseek_r1 reasoning parser.
# Backpressure middleware: returns HTTP 503 when
# server_load_metrics >= max_num_seqs.
# -----------------------------
apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: vllm-qwen3-30b-runtime
spec:
  supportedModelFormats:
    - name: huggingface
      version: "1"
      autoSelect: false
  containers:
    - name: kserve-container
      image: vllm/vllm-openai:latest
      args:
        - "--model=$(MODEL_ID)"
        - "--tensor-parallel-size=1"
        - "--gpu-memory-utilization=0.95"
        - "--max-model-len=40960"
        - "--dtype=auto"
        - "--kv-cache-dtype=fp8"
        - "--trust-remote-code"
        - "--quantization=awq_marlin"
        - "--max-num-seqs=1"
        - "--enable-server-load-tracking"
        - "--middleware=backpressure.BackpressureMiddleware"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser=hermes"
        - "--reasoning-parser=deepseek_r1"
      env:
        - name: MODEL_ID
          value: ""
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
        - name: PYTHONPATH
          value: "/opt/workspace/middlewares:${PYTHONPATH:-}"
      volumeMounts:
        - name: middleware-volume
          mountPath: /opt/workspace/middlewares
          readOnly: true
      resources:
        limits:
          nvidia.com/gpu: 1
          memory: "12Gi"
        requests:
          nvidia.com/gpu: 1
          memory: "12Gi"
      ports:
        - containerPort: 8000
  volumes:
    - name: middleware-volume
      configMap:
        name: vllm-middlewares
