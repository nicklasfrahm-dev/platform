# -----------------------------
# InferenceService (Qwen3 30B-A3B AWQ)
# -----------------------------
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen3-30b
spec:
  predictor:
    deploymentStrategy:
      type: Recreate
    runtimeClassName: nvidia
    nodeSelector:
      feature.node.kubernetes.io/pci-10de.present: "true"
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
    model:
      modelFormat:
        name: huggingface
      runtime: vllm-qwen3-30b-runtime
      args:
        - "--served-model-name=qwen3-30b"
      env:
        - name: MODEL_ID
          value: "QuixiAI/Qwen3-30B-A3B-AWQ"
      resources:
        limits:
          nvidia.com/gpu: 1
          memory: "12Gi"
        requests:
          nvidia.com/gpu: 1
          memory: "12Gi"
