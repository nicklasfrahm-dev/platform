oauth2-proxy:
  config:
    upstreams:
      - http://rook-ceph-mgr-dashboard:7000
  extraArgs:
    - --provider=oidc
    - --pkce-code-challenge-method=S256
    - --oidc-issuer-url=https://auth.nicklasfrahm.dev
    - --client-secret=
    - --skip-provider-button=true
    - --pass-authorization-header=true
    - --set-xauthrequest=true
  resources:
    limits:
      memory: "128Mi"
    requests:
      cpu: "50m"
      memory: "128Mi"

httpRoute:
  enabled: true
  gateway:
    namespace: platform
    name: shared-http
  hostname: ceph.cph02.nicklasfrahm.dev
