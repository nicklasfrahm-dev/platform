grafana:
  adminUser: admin
  persistence:
    enabled: true
    size: 10Gi
  # kubectl create secret generic grafana-oidc --from-literal=client_secret=<secret>
  env:
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      valueFrom:
        secretKeyRef:
          name: grafana-oidc
          key: client_secret
  grafana.ini:
    server:
      domain: grafana.nicklasfrahm.dev
      root_url: https://grafana.nicklasfrahm.dev
    database:
      type: postgres
      host: grafana-postgres-rw.platform:5432
      name: grafana
      user: grafana
      password: ${GF_DATABASE_PASSWORD}
    auth:
      disable_login_form: true
      oauth_auto_login: true
    auth.generic_oauth:
      enabled: true
      name: Dex
      allow_sign_up: true
      client_id: grafana
      client_secret: ${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid email profile groups
      auth_url: https://auth.nicklasfrahm.dev/auth
      token_url: https://auth.nicklasfrahm.dev/token
      api_url: https://auth.nicklasfrahm.dev/userinfo
      role_attribute_path: "contains(groups[*], 'nicklasfrahm-dev') && 'Admin' || 'Viewer'"
      role_attribute_strict: false
    log:
      mode: console
    analytics:
      check_for_updates: false
