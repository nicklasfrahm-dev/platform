# Admit the cph02 cluster: telemetry sent with "X-Cluster: cph02" is authorized
# against https://oidc.cph02.<platform.domain>/v1/openid/jwks.
auth:
  clusters:
    cph02: true

# Provision the Ceph object buckets backing Loki's log storage and Mimir's
# block storage on this cluster.
cephBuckets:
  logs:
    enabled: true
  metrics:
    enabled: true
