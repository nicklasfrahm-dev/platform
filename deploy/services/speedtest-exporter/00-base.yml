# Image configuration - override default image
image:
  repository: "ghcr.io/nicklasfrahm/prometheus-speedtest-exporter"
  tag: "v1.1.2"

# Service configuration - override default port
service:
  port: 9516
  containerPort: 9516

# Resource configuration - override default resources
resources:
  cpu: 100m
  memory: 128Mi

# Probe configuration - override default probe paths
probes:
  liveness:
    port: 9516
    path: /livez
  readiness:
    port: 9516
    path: /readyz
  startup:
    port: 9516
    path: /readyz
    # Allow up to 5m for the container to become ready.
    periodSeconds: 10
    failureThreshold: 30

# Disable autoscaling for Prometheus exporter
autoscaling:
  enabled: false
  minReplicas: 1

# /metrics always serves from cache, so scrapes only need to cover the
# HTTP round trip, not a full speedtest
# (see https://github.com/nicklasfrahm/prometheus-speedtest-exporter).
metrics:
  enabled: true
  scrapeInterval: 1m
